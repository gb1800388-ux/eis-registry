function renderRecoveryPage(root) {
  const emp = state.employees;

  if (emp.length === 0) {
    root.innerHTML = emptyState({
      title: 'Нет сотрудников для восстановления',
      text: 'Заполните анкеты, чтобы сформировать персональные чек-листы',
      action: '<button class="btn btn-primary" onclick="goto(\'survey\')">К анкете</button>'
    });
    return;
  }

  // Pick first employee by default
  ui.recoveryEmpId ||= emp[0].id;
  let current = emp.find(e => e.id === ui.recoveryEmpId);
  if (!current) { ui.recoveryEmpId = emp[0].id; current = emp[0]; }

  // Build checklist for this employee — merged steps
  const ckey = 'emp_' + current.id;
  checklists[ckey] ||= {};

  // Step groups:
  // 1. Base AРМ
  const baseSteps = DEFAULT_RECOVERY_STEPS.map(s => ({...s, group: 'base', key: 'base_' + s.id}));
  // 2. ECP per record
  const ecpSteps = (current.ecps || []).map((c, i) => ({
    group: 'ecp',
    key: 'ecp_' + i,
    label: `Восстановить ЭЦП: ${c.type}`,
    hint: c.expiry ? `Срок действия до ${fmtDate(c.expiry)}` : 'Срок не указан'
  }));
  if (current.cryptoVersion || current.cryptoExpiry) {
    ecpSteps.unshift({
      group: 'ecp',
      key: 'crypto_lic',
      label: `Лицензия КриптоПро CSP ${current.cryptoVersion || ''}`,
      hint: current.cryptoExpiry ? `Срок лицензии до ${fmtDate(current.cryptoExpiry)}` : 'Срок не указан'
    });
  }
  // 3. Systems specific to this employee
  const sysSteps = (current.systems || []).map(s => {
    const meta = state.systems.find(x => systemKey(x.name) === systemKey(s.name));
    return {
      group: 'sys',
      key: 'sys_' + systemKey(s.name).replace(/\W/g,'_'),
      label: s.name,
      hint: [
        meta?.type || '',
        s.frequency ? FREQ[s.frequency]?.label : '',
        meta?.priority ? PRIORITY[meta.priority]?.label : '',
        s.purpose || ''
      ].filter(Boolean).join(' · ')
    };
  });

  const allSteps = [...baseSteps, ...ecpSteps, ...sysSteps];
  const doneCount = allSteps.filter(s => checklists[ckey][s.key]).length;
  const totalCount = allSteps.length;
  const pct = totalCount ? Math.round(doneCount / totalCount * 100) : 0;

  const stepRow = (s) => {
    const done = !!checklists[ckey][s.key];
    return `
      <div class="check-item ${done ? 'done' : ''}" onclick="toggleCheck('${ckey}','${s.key}')">
        <span class="check-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
        <div style="flex:1;min-width:0">
          <div class="check-label">${esc(s.label)}</div>
          ${s.hint ? `<div class="check-hint">${esc(s.hint)}</div>` : ''}
        </div>
      </div>`;
  };

  root.innerHTML = `
    <div class="card" style="margin-bottom:16px">
      <div class="card-head">
        <div>
          <h3>Выберите <em>сотрудника</em></h3>
          <div class="card-sub">Чек-лист для восстановления его АРМ или ввода замещающего сотрудника в курс дела</div>
        </div>
      </div>
      <div class="card-body">
        <div class="emp-picker">
          ${emp.map(e => `
            <button class="emp-pick-btn ${e.id === current.id ? 'active' : ''}" onclick="selectRecoveryEmp('${e.id}')">
              ${esc(shortName(e.fullName))}
              <span style="opacity:.7;margin-left:6px;font-size:11px">${esc(e.department || '—')}</span>
            </button>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="grid grid-2" style="gap:16px">
      <div>
        <div class="card" style="margin-bottom:16px">
          <div class="card-head">
            <h3>${esc(shortName(current.fullName))} · <em>профиль</em></h3>
            <div class="card-sub">Данные из анкеты</div>
          </div>
          <div class="card-body">
            <dl class="kv">
              <div class="kv-row"><dt>ФИО</dt><dd>${esc(current.fullName)}</dd></div>
              <div class="kv-row"><dt>Должность</dt><dd>${esc(current.position || '—')}</dd></div>
              <div class="kv-row"><dt>Отдел</dt><dd>${esc(current.department || '—')}</dd></div>
              <div class="kv-row"><dt>Идентификатор АРМ</dt><dd>${esc(current.armId || '—')}</dd></div>
              <div class="kv-row"><dt>КриптоПро CSP</dt><dd>${esc(current.cryptoVersion || '—')}</dd></div>
              <div class="kv-row"><dt>Лицензия до</dt><dd>${fmtDate(current.cryptoExpiry)}</dd></div>
              <div class="kv-row"><dt>ЭЦП</dt><dd>${current.ecps?.length || 0}</dd></div>
              <div class="kv-row"><dt>Систем</dt><dd>${current.systems?.length || 0}</dd></div>
            </dl>
            ${current.notes ? `<div style="margin-top:14px;padding:10px 12px;background:var(--paper-2);border-radius:var(--radius);font-size:12.5px;color:var(--ink-2);line-height:1.5"><strong style="color:var(--ink);font-size:11px;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:4px">Заметки</strong>${esc(current.notes)}</div>` : ''}
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <h3>Прогресс <em>восстановления</em></h3>
            <div class="card-sub">${doneCount} из ${totalCount} · ${pct}%</div>
          </div>
          <div class="card-body">
            <div class="progress ${pct >= 80 ? 'ok' : pct >= 40 ? 'warn' : ''}" style="height:8px;margin-bottom:10px">
              <div class="progress-bar" style="width:${pct}%"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink-3)">
              <span>Начало</span>
              <span style="font-weight:600;color:var(--ink);font-size:18px;font-family:var(--font-display)" class="num">${pct}%</span>
              <span>Готово</span>
            </div>
            <div style="display:flex;gap:6px;margin-top:14px">
              <button class="btn btn-ghost btn-sm" onclick="resetRecovery('${ckey}')">Сбросить</button>
              <button class="btn btn-sm" onclick="markAllRecovery('${ckey}', ${JSON.stringify(allSteps.map(s=>s.key)).replace(/"/g,'&quot;')})">Отметить всё</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h3>Чек-<em>лист</em></h3>
          <div class="card-sub">Пошаговая инструкция по восстановлению</div>
        </div>
        <div class="card-body" style="padding:16px 12px">
          <div class="check-group">
            <div class="check-group-label">Базовое АРМ · ${baseSteps.filter(s => checklists[ckey][s.key]).length}/${baseSteps.length}</div>
            <div class="check-list">${baseSteps.map(stepRow).join('')}</div>
          </div>
          ${ecpSteps.length > 0 ? `
          <div class="check-group">
            <div class="check-group-label">ЭЦП и КриптоПро · ${ecpSteps.filter(s => checklists[ckey][s.key]).length}/${ecpSteps.length}</div>
            <div class="check-list">${ecpSteps.map(stepRow).join('')}</div>
          </div>` : ''}
          ${sysSteps.length > 0 ? `
          <div class="check-group">
            <div class="check-group-label">Системы сотрудника · ${sysSteps.filter(s => checklists[ckey][s.key]).length}/${sysSteps.length}</div>
            <div class="check-list">${sysSteps.map(stepRow).join('')}</div>
          </div>` : ''}
        </div>
      </div>
    </div>
  `;
}

function selectRecoveryEmp(id) {
  ui.recoveryEmpId = id;
  if (ui.currentPage !== 'recovery') { goto('recovery'); return; }
  renderRecoveryPage($('#page-recovery'));
}

function toggleCheck(ckey, stepKey) {
  checklists[ckey] ||= {};
  checklists[ckey][stepKey] = !checklists[ckey][stepKey];
  save();
  renderRecoveryPage($('#page-recovery'));
}

function resetRecovery(ckey) {
  confirmAction('Сбросить прогресс?', 'Все отметки чек-листа будут сняты.', () => {
    checklists[ckey] = {};
    save();
    renderRecoveryPage($('#page-recovery'));
    toast('Прогресс сброшен');
  });
}

function markAllRecovery(ckey, keys) {
  checklists[ckey] = {};
  (Array.isArray(keys) ? keys : JSON.parse(keys)).forEach(k => checklists[ckey][k] = true);
  save();
  renderRecoveryPage($('#page-recovery'));
  toast('Все шаги отмечены');
}

    riskC.style.color = n > 0 ? '#fff' : '';

function download(filename, content, mime = 'text/plain') {
  const blob = new Blob([content], { type: mime + ';charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    URL.revokeObjectURL(a.href);
    a.remove();
  }, 200);
}

function csvEscape(v) {
  if (v == null) return '';
  const s = String(v);
  if (/[",;\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function exportCSV(mode) {
  closeDDs();
  const stamp = new Date().toISOString().slice(0,10);
  if (mode === 'employees') {
    const rows = [['ФИО','Должность','Отдел','АРМ','Систем','ЭЦП','КриптоПро версия','Лицензия КриптоПро до','Статус','Заметки']];
    state.employees.forEach(e => {
      rows.push([
        e.fullName, e.position, e.department, e.armId,
        e.systems?.length || 0, e.ecps?.length || 0,
        e.cryptoVersion, fmtDate(e.cryptoExpiry),
        CRYPTO_STATUS[e.cryptoStatus]?.label || '', e.notes
      ]);
    });
    const csv = '\uFEFF' + rows.map(r => r.map(csvEscape).join(';')).join('\r\n');
    download(`сотрудники_${stamp}.csv`, csv, 'text/csv');
    toast('CSV экспортирован');
  } else if (mode === 'full') {
    const rows = [['ФИО','Отдел','Должность','Система','Назначение','Частота','Приоритет','Требует ЭЦП']];
    state.employees.forEach(e => {
      if (!(e.systems || []).length) {
        rows.push([e.fullName, e.department, e.position, '', '', '', '', '']);
      }
      (e.systems || []).forEach(s => {
        const meta = state.systems.find(x => systemKey(x.name) === systemKey(s.name));
        rows.push([
          e.fullName, e.department, e.position,
          s.name, s.purpose, FREQ[s.frequency]?.label || '',
          PRIORITY[meta?.priority]?.label || '',
          meta?.requiresEcp ? 'да' : ''
        ]);
      });
    });
    const csv = '\uFEFF' + rows.map(r => r.map(csvEscape).join(';')).join('\r\n');
    download(`реестр_полный_${stamp}.csv`, csv, 'text/csv');
    toast('Полный CSV экспортирован');
  }
}

function exportJSON() {
  closeDDs();
  const payload = {
    version: 3,
    exportedAt: new Date().toISOString(),
    state,
    checklists
  };
  const stamp = new Date().toISOString().slice(0,10);
  download(`реестр_ЭИС_${stamp}.json`, JSON.stringify(payload, null, 2), 'application/json');

function importJSON(ev) {
  closeDDs();
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.state) throw new Error('Некорректный формат');
      confirmAction('Импорт данных', `Текущие данные (${state.employees.length} сотр., ${state.systems.length} сист.) будут заменены данными из файла (${data.state.employees?.length || 0} сотр., ${data.state.systems?.length || 0} сист.).`, () => {
        snapshot('Импорт из JSON');
        state = data.state;
        checklists = data.checklists || {};
        save();
        refreshSidebarCounts();
        goto(ui.currentPage);
        toast('Данные импортированы — Ctrl+Z чтобы вернуть');
      });
    } catch (err) {
      toast('Ошибка: ' + err.message, 'bad');
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

/* ============================================================================
   IMPORT FROM 1C:ЗУП — accepts CSV (UTF-8 / Windows-1251 / UTF-16 BOM)
   and XLSX (SheetJS loaded lazily from the CDN cached by the service worker).
   Auto-detects columns by their Russian headers, shows a preview and lets
   the user pick a merge strategy before committing.
   ============================================================================ */

/* Simple CSV parser that supports: , ; \t separators, quoted fields,
   escaped quotes (""), and CRLF / LF line endings. */
function parseCSV(text) {
  if (!text) return [];
  // Auto-detect separator — majority vote on the first non-empty line.
  const firstLine = text.split(/\r?\n/).find(l => l.trim()) || '';
  const counts = { ',': 0, ';': 0, '\t': 0 };
  let inQ = false;
  for (const ch of firstLine) {
    if (ch === '"') inQ = !inQ;
    else if (!inQ && counts[ch] !== undefined) counts[ch]++;
  }
  const sep = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];

  const rows = [];
  let row = [], field = '', q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (q) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else q = false;
      } else field += c;
    } else {
      if (c === '"') q = true;
      else if (c === sep) { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i + 1] === '\n') i++;
        row.push(field); field = '';
        if (row.some(x => x.trim())) rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); if (row.some(x => x.trim())) rows.push(row); }
  return rows;
}

/* Try common encodings — 1С often exports as Windows-1251. */
async function readAsTextAutoEncoding(file) {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  // UTF-8 BOM
  if (bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) {
    return new TextDecoder('utf-8').decode(bytes.slice(3));
  }
  // UTF-16 LE BOM
  if (bytes[0] === 0xFF && bytes[1] === 0xFE) {
    return new TextDecoder('utf-16le').decode(bytes.slice(2));
  }
  // Heuristic: if we see many bytes in the 0xC0-0xFF range but almost no valid
  // UTF-8 multibyte sequences, it's probably Windows-1251.
  let high = 0, utf8ok = 0, i = 0;
  while (i < Math.min(bytes.length, 8000)) {
    const b = bytes[i];
    if (b >= 0xC0) {
      high++;
      // quick UTF-8 multibyte validation
      if ((b & 0xE0) === 0xC0 && (bytes[i + 1] & 0xC0) === 0x80) { utf8ok++; i += 2; continue; }
      if ((b & 0xF0) === 0xE0 && (bytes[i + 1] & 0xC0) === 0x80 && (bytes[i + 2] & 0xC0) === 0x80) { utf8ok++; i += 3; continue; }
    }
    i++;
  }
  const looksCyrillic = high > 5 && utf8ok / Math.max(high, 1) < 0.5;
  const enc = looksCyrillic ? 'windows-1251' : 'utf-8';
  try {
    return new TextDecoder(enc, { fatal: false }).decode(bytes);
  } catch {
    return new TextDecoder('utf-8', { fatal: false }).decode(bytes);
  }
}

/* Given a list of header strings, return an index map for our fields. */
function detect1CColumns(headers) {
  const norm = (s) => (s || '').toString().toLowerCase().replace(/[ёЁ]/g, 'е').replace(/[\s«»".,_-]+/g, '');
  const h = headers.map(norm);
  const findOneOf = (...needles) => {
    for (let i = 0; i < h.length; i++) {
      if (needles.some(n => h[i].includes(norm(n)))) return i;
    }
    return -1;
  };
  return {
    fullName:   findOneOf('фио', 'сотрудник', 'фамилияимяотчество', 'полноеимя'),
    lastName:   findOneOf('фамилия'),
    firstName:  findOneOf('имя'),
    middleName: findOneOf('отчество'),
    position:   findOneOf('должность'),
    department: findOneOf('подразделение', 'отдел', 'департамент'),
    armId:      findOneOf('табельный', 'таб№', 'табномер', 'номерсотрудника'),
    phone:      findOneOf('телефон', 'мобильный'),
    email:      findOneOf('email', 'электроннаяпочта', 'почта')
  };
}

function buildFullName(row, cols) {
  if (cols.fullName >= 0 && row[cols.fullName]?.trim()) return row[cols.fullName].trim();
  const parts = [
    cols.lastName   >= 0 ? row[cols.lastName]   : '',
    cols.firstName  >= 0 ? row[cols.firstName]  : '',
    cols.middleName >= 0 ? row[cols.middleName] : ''
  ].map(s => (s || '').trim()).filter(Boolean);
  return parts.join(' ');
}

async function import1C(ev) {
  closeDDs();
  const file = ev.target.files[0];
  if (!file) return;
  ev.target.value = '';
  try {
    const ext = file.name.toLowerCase().split('.').pop();
    let rows;
    if (ext === 'xls' || ext === 'xlsx') {
      rows = await parseXlsx(file);
    } else {
      const text = await readAsTextAutoEncoding(file);
      rows = parseCSV(text);
    }
    if (!rows.length || rows.length < 2) {
      toast('Файл пустой или нет строк с данными', 'bad');
      return;
    }
    const headers = rows[0];
    const dataRows = rows.slice(1);
    const cols = detect1CColumns(headers);
    if (cols.fullName < 0 && cols.lastName < 0) {
      toast('Не найден столбец ФИО — проверьте заголовки', 'bad');
      return;
    }
    openImport1CPreview(file.name, headers, dataRows, cols);
  } catch (err) {
    console.error(err);
    toast('Не удалось прочитать файл: ' + (err?.message || err), 'bad');
  }
}

async function parseXlsx(file) {
  // Lazy-load SheetJS. It will be cached by the service worker after first fetch.
  if (!window.XLSX) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload = resolve;
      s.onerror = () => reject(new Error('Не удалось загрузить парсер XLSX'));
      document.head.appendChild(s);
    });
  }
  const buf = await file.arrayBuffer();
  const wb = window.XLSX.read(buf, { type: 'array' });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  return window.XLSX.utils.sheet_to_json(sheet, { header: 1, blankrows: false, defval: '' });
}

function openImport1CPreview(fileName, headers, dataRows, cols) {
  // Staging: build candidate employees and classify as new / existing
  const byName = new Map(state.employees.map(e => [e.fullName.trim().toLowerCase(), e]));
  const candidates = dataRows.map((row, i) => {
    const fullName = buildFullName(row, cols);
    const exists = byName.get(fullName.toLowerCase());
    return {
      i,
      row,
      fullName,
      position:   cols.position   >= 0 ? (row[cols.position]   || '').trim() : '',
      department: cols.department >= 0 ? (row[cols.department] || '').trim() : '',
      armId:      cols.armId      >= 0 ? (row[cols.armId]      || '').trim() : '',
      existingId: exists?.id || null,
      include:    !!fullName
    };
  }).filter(c => c.fullName);

  const newCount = candidates.filter(c => !c.existingId).length;
  const updCount = candidates.filter(c =>  c.existingId).length;

  const columnPill = (name, idx) => `
    <span class="imp-col">
      <span class="imp-col-label">${esc(name)}</span>
      <span class="imp-col-val">${idx >= 0 ? esc(headers[idx] || '—') : '<em>не найдено</em>'}</span>
    </span>`;

  openModal({
    title: 'Импорт из 1С:ЗУП',
    sub: fileName + ' · ' + dataRows.length + ' ' + plural(dataRows.length,'строка','строки','строк'),
    body: `
      <div class="imp-cols">
        ${columnPill('ФИО', cols.fullName >= 0 ? cols.fullName : cols.lastName)}
        ${columnPill('Должность', cols.position)}
        ${columnPill('Отдел', cols.department)}
        ${columnPill('Таб. №', cols.armId)}
      </div>
      <div class="imp-summary">
        <span class="imp-badge new">${newCount} ${plural(newCount,'новый','новых','новых')}</span>
        <span class="imp-badge upd">${updCount} ${plural(updCount,'обновит','обновит','обновит')}</span>
      </div>
      <div class="imp-table-wrap">
        <table class="imp-table">
          <thead><tr><th style="width:28px"></th><th>ФИО</th><th>Должность</th><th>Отдел</th><th style="width:90px">Статус</th></tr></thead>
          <tbody>
            ${candidates.slice(0, 60).map((c, i) => `
              <tr class="${c.existingId ? 'upd' : 'new'}">
                <td><input type="checkbox" class="imp-row" data-i="${i}" checked style="width:16px;height:16px;accent-color:var(--accent)"></td>
                <td>${esc(c.fullName)}</td>
                <td>${esc(c.position || '—')}</td>
                <td>${esc(c.department || '—')}</td>
                <td><span class="imp-badge ${c.existingId ? 'upd' : 'new'}">${c.existingId ? 'обновить' : 'новый'}</span></td>
              </tr>
            `).join('')}
            ${candidates.length > 60 ? `<tr><td colspan="5" class="imp-more">… и ещё ${candidates.length - 60} (все импортируются)</td></tr>` : ''}
          </tbody>
        </table>
      </div>
      <div class="field" style="margin-top:14px">
        <label class="label">Стратегия для совпадений по ФИО</label>
        <select class="select" id="impStrategy">
          <option value="skip">Пропускать существующих (безопасный режим)</option>
          <option value="update" selected>Обновлять должность/отдел/таб. №</option>
        </select>
      </div>
    `,
    footer: `
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="impConfirm">Импортировать</button>
    `
  });

  // Stash candidates on the modal so the confirm button can read them
  $('#impConfirm').onclick = () => runImport1C(candidates);
}

function runImport1C(candidates) {
  const strategy = $('#impStrategy').value;
  const picked = new Set(
    [...$$('.imp-row')].filter(ch => ch.checked).map(ch => +ch.dataset.i)
  );
  // For rows that are not rendered (>60), default to including them
  const willImport = candidates.filter((c, i) => picked.has(i) || i >= 60);
  if (!willImport.length) { toast('Никто не выбран', 'bad'); return; }

  snapshot('Импорт из 1С:ЗУП (' + willImport.length + ' стр.)');
  let added = 0, updated = 0, skipped = 0;
  for (const c of willImport) {
    if (c.existingId) {
      if (strategy === 'skip') { skipped++; continue; }
      const emp = state.employees.find(e => e.id === c.existingId);
      if (!emp) continue;
      if (c.position)   emp.position = c.position;
      if (c.department) emp.department = c.department;
      if (c.armId)      emp.armId = c.armId;
      emp.updatedAt = new Date().toISOString();
      updated++;
    } else {
      state.employees.push({
        id: uid(),
        fullName: c.fullName,
        position: c.position || '',
        department: c.department || '',
        armId: c.armId || '',
        systems: [],
        ecps: [],
        attachments: [],
        cryptoVersion: '',
        cryptoExpiry: '',
        cryptoStatus: 'not_installed',
        notes: '',
        updatedAt: new Date().toISOString()
      });
      added++;
    }
  }
  save();
  closeModal();
  refreshSidebarCounts();
  goto('employees');
  const bits = [];
  if (added)   bits.push('добавлено ' + added);
  if (updated) bits.push('обновлено ' + updated);
  if (skipped) bits.push('пропущено ' + skipped);
  toast('Импорт завершён: ' + bits.join(', ') + ' — Ctrl+Z чтобы вернуть');
}

/* ============================================================================
   PRINTABLE SHEETS — offboarding (обходной лист) + onboarding (онбординг-лист)
   Rendered into a dedicated overlay. body.printing hides the rest of the app
   and shows only the sheet, both on screen and via @media print.
   ============================================================================ */

function openPrintableSheet(html) {
  let sheet = $('#printSheet');
  if (!sheet) {
    sheet = document.createElement('div');
    sheet.id = 'printSheet';
    sheet.className = 'sheet-overlay';
    document.body.appendChild(sheet);
  }
  sheet.innerHTML = `
    <div class="sheet-toolbar">
      <button class="btn" onclick="closePrintableSheet()">Закрыть</button>
      <button class="btn btn-primary" onclick="window.print()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Печать
      </button>
    </div>
    <div class="sheet-page">${html}</div>
  `;
  document.body.classList.add('printing');
}

function closePrintableSheet() {
  document.body.classList.remove('printing');
  const sheet = $('#printSheet');
  if (sheet) sheet.innerHTML = '';
}

  openPrintableSheet(html);
}

function clearAll() {
  confirmAction('Очистить все данные?', 'Будут удалены все сотрудники, системы и чек-листы. Операция обратима через Ctrl+Z до перезагрузки страницы. Рекомендуется сначала экспортировать резервную копию.', () => {
    snapshot('Очистка всех данных');
    state = { employees: [], systems: [] };
    checklists = {};
    save();
    seedDemo();
    save();
    refreshSidebarCounts();
    goto('survey');
    toast('Данные очищены — Ctrl+Z чтобы вернуть');
  });
}

function closeDDs() {
  $$('.dd-menu.open').forEach(el => el.classList.remove('open'));
}

/* ============================================================================
   ========================== BOOTSTRAP =======================================
   ============================================================================ */
document.addEventListener('DOMContentLoaded', () => {
  load();

  // Sidebar navigation
  $$('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => goto(btn.dataset.page));
  });

  // Burger menu
  $('#burgerBtn')?.addEventListener('click', () => {
    $('#nav').classList.toggle('open');
  });

  // Close dropdowns on outside click
  document.addEventListener('click', (ev) => {
    if (!ev.target.closest('.dd')) closeDDs();
  });

  // Command palette input wiring
  const cmdkInput = $('#cmdkInput');
  if (cmdkInput) {
    cmdkInput.addEventListener('input', () => renderCmdKList(cmdkInput.value));
    cmdkInput.addEventListener('keydown', cmdKKey);
  }

  // Global keyboard shortcuts
  document.addEventListener('keydown', (ev) => {
    const inField = ev.target.matches('input, textarea, select, [contenteditable]');

    // Esc closes layers
    if (ev.key === 'Escape') {
      if (cmdk.open) closeCmdK();
      closeModal();
      closeDDs();
      return;
    }

    // ⌘K / Ctrl+K — open command palette
    if ((ev.ctrlKey || ev.metaKey) && (ev.key === 'k' || ev.key === 'K')) {
      ev.preventDefault();
      cmdk.open ? closeCmdK() : openCmdK();
      return;
    }

    // "/" — open palette when not typing
    if (ev.key === '/' && !inField && !cmdk.open) {
      ev.preventDefault();
      openCmdK();
      return;
    }

    // Ctrl+Z / ⌘Z — undo  (Shift+ — redo)
    if ((ev.ctrlKey || ev.metaKey) && (ev.key === 'z' || ev.key === 'Z') && !inField) {
      ev.preventDefault();
      ev.shiftKey ? redo() : undo();
      return;
    }
    // Ctrl+Y — redo
    if ((ev.ctrlKey || ev.metaKey) && (ev.key === 'y' || ev.key === 'Y') && !inField) {
      ev.preventDefault();
      redo();
      return;
    }

    // Ctrl+S on survey page — save
    if ((ev.ctrlKey || ev.metaKey) && ev.key === 's' && ui.currentPage === 'survey') {
      ev.preventDefault();
      const form = $('#surveyForm');
      if (form) form.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
    }
  });

  // Initial render
  refreshSidebarCounts();
  goto('survey');

  // Update last-save indicator with current time if data existed
  if (state.employees.length || state.systems.length) {
    $('#last-save').textContent = fmtTime(new Date().toISOString());
  }

  // ------------------------------------------------------------------
  // PWA: register service worker and wire the install pill
  // ------------------------------------------------------------------
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    navigator.serviceWorker.register('./sw.js').catch(err => {
      console.warn('[pwa] sw registration failed:', err);
    });
  }
  let deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (ev) => {
    ev.preventDefault();
    deferredInstallPrompt = ev;
    const pill = $('#installPill');
    if (pill) pill.hidden = false;
  });
  window.addEventListener('appinstalled', () => {
    deferredInstallPrompt = null;
    const pill = $('#installPill');
    if (pill) pill.hidden = true;
    toast('Приложение установлено');
  });
  $('#installPill')?.addEventListener('click', async () => {
    if (!deferredInstallPrompt) {
      toast('Браузер уже считает приложение установленным или не поддерживает установку', 'bad');
      return;
    }
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    if (outcome === 'accepted') {
      deferredInstallPrompt = null;
      $('#installPill').hidden = true;
    }
  });
});
</script>
