/* ========================================================================
   MODAL
   ======================================================================== */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(26,23,20,.55);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 100;
  padding: 20px;
  animation: modalFadeIn .2s var(--ease);
}
.modal-bg.open { display: flex; }
@keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--card);
  border-radius: var(--radius-lg);
  max-width: 560px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 24px 48px -16px rgba(26,23,20,.4);
  animation: modalIn .2s var(--ease);
}
@keyframes modalIn { from { opacity: 0; transform: scale(.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-head {
  padding: 22px 24px 0;
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px;
}
.modal-head h3 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -.02em;
  line-height: 1.15;
}
.modal-head .sub { font-size: 12px; color: var(--ink-3); margin-top: 4px; }
.modal-body { padding: 20px 24px 8px; }
.modal-foot {
  padding: 16px 24px 20px;
  display: flex; justify-content: flex-end; gap: 8px;
}

/* ========================================================================
   TOAST
   ======================================================================== */
.toasts {
  position: fixed; bottom: 20px; right: 20px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 200;
  pointer-events: none;
  max-width: 380px;
}
.toast {
  pointer-events: auto;
  background: var(--ink);
  color: var(--paper);
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 24px -8px rgba(26,23,20,.4);
  animation: tIn .25s var(--ease), tOut .25s var(--ease) 2.6s forwards;
}
.toast.ok  { background: var(--ok);  }
.toast.bad { background: var(--bad); }
.toast svg { width: 14px; height: 14px; flex-shrink: 0; }
@keyframes tIn  { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes tOut { from { opacity: 1; } to { opacity: 0; transform: translateX(10px); } }

/* ========================================================================
   EMPTY STATES
   ======================================================================== */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--ink-3);
}
.empty-mark {
  display: inline-flex;
  align-items: center; justify-content: center;
  width: 44px; height: 44px;
  background: var(--paper-2);
  color: var(--ink-4);
  border-radius: 50%;
  margin-bottom: 14px;
}
.empty-mark svg { width: 20px; height: 20px; }
.empty-title {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--ink-2);
  margin-bottom: 6px;
  font-weight: 500;
}
.empty-text { font-size: 13px; margin-bottom: 16px; }

/* ========================================================================
   MISC UTILITIES
   ======================================================================== */
.row { display: flex; align-items: center; gap: 10px; }
.row-between { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
.mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-6 { margin-top: 24px; }
.mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; } .mb-6 { margin-bottom: 24px; }
.hidden { display: none !important; }
.flex-1 { flex: 1; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Divider with label */
.divider {
  display: flex; align-items: center; gap: 14px;
  color: var(--ink-3);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .1em;
  font-weight: 600;
  margin: 24px 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--paper-3);
}

/* Checklist */
.chk-list { display: flex; flex-direction: column; gap: 2px; }
.chk-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 11px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background .12s;
  border: 1px solid transparent;
}
.chk-item:hover { background: var(--paper-2); }
.chk-item.done { color: var(--ink-3); }
.chk-item.done .chk-label { text-decoration: line-through; text-decoration-color: var(--ink-4); }
.chk-box {
  width: 18px; height: 18px; border-radius: 4px;
  border: 1.5px solid var(--ink-4);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
  margin-top: 1px;
}
.chk-item.done .chk-box {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--paper);
}
.chk-box svg {
  width: 12px; height: 12px;
  opacity: 0;
  transition: opacity .15s;
}
.chk-item.done .chk-box svg { opacity: 1; }
.chk-label { font-size: 13.5px; font-weight: 500; line-height: 1.4; }
.chk-hint { font-size: 12px; color: var(--ink-3); margin-top: 2px; }

/* Tabs */
.tabs {
  display: flex; gap: 2px;
  padding: 3px;
  background: var(--paper-2);
  border-radius: var(--radius);
  border: 1px solid var(--paper-3);
  width: fit-content;
}
.tab {
  padding: 6px 14px;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-3);
  border-radius: 4px;
  transition: all .15s;
}
.tab:hover { color: var(--ink-2); }
.tab.active {
  background: var(--card);
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(26,23,20,.08);
}

/* Chart wrapper */
.chart-box { height: 240px; position: relative; }

/* ========================================================================
   CHECKLIST — recovery steps per employee
   ======================================================================== */
.check-list { display: flex; flex-direction: column; gap: 2px; }
.check-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background .15s;
  border: 1px solid transparent;
}
.check-item:hover { background: var(--paper); }
.check-item.done { opacity: .55; }
.check-item.done .check-label { text-decoration: line-through; text-decoration-thickness: 1px; text-decoration-color: var(--ink-3); }
.check-box {
  width: 18px; height: 18px;
  border: 1.5px solid var(--ink-4);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
  display: inline-flex; align-items: center; justify-content: center;
  color: transparent;
  transition: all .15s;
}
.check-item.done .check-box {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.check-box svg { width: 12px; height: 12px; }
.check-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.35;
}
.check-hint {
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 3px;
  line-height: 1.45;
}
.check-group {
  margin-bottom: 18px;
}
.check-group-label {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .12em;
  font-weight: 600;
  color: var(--ink-3);
  padding: 8px 14px 6px;
}

/* ========================================================================
   PROGRESS BAR
   ======================================================================== */
.progress {
  height: 6px;
  background: var(--paper-2);
  border-radius: 99px;
  overflow: hidden;
  position: relative;
}
.progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width .4s var(--ease);
}
.progress.ok .progress-bar { background: var(--ok); }
.progress.warn .progress-bar { background: var(--warn); }
.progress.bad .progress-bar { background: var(--bad); }

/* ========================================================================
   KEY-VALUE LIST — used on recovery, department cards
   ======================================================================== */
.kv { display: flex; flex-direction: column; gap: 8px; }
.kv-row {
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 12px;
  font-size: 13px;
  padding: 6px 0;
  border-bottom: 1px dashed var(--paper-3);
}
.kv-row:last-child { border-bottom: 0; }
.kv-row dt { color: var(--ink-3); font-weight: 400; }
.kv-row dd { color: var(--ink); font-weight: 500; font-variant-numeric: tabular-nums; text-align: right; }

/* ========================================================================
   DEPARTMENT CARDS
   ======================================================================== */
.dept-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}
.dept-card {
  background: var(--card);
  border: 1px solid var(--paper-3);
  border-radius: var(--radius);
  padding: 22px 24px;
  display: flex; flex-direction: column;
  gap: 16px;
}
.dept-card-head {
  padding-bottom: 14px;
  border-bottom: 1px solid var(--paper-3);
}
.dept-name {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -.01em;
  line-height: 1.15;
  margin-bottom: 4px;
}
.dept-name em { color: var(--accent); font-style: italic; }
.dept-sub {
  font-size: 12px;
  color: var(--ink-3);
}
.dept-section-label {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .12em;
  font-weight: 600;
  color: var(--ink-3);
  margin-bottom: 8px;
}
.dept-people {
  display: flex; flex-direction: column; gap: 8px;
}
.dept-person {
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 12px;
  padding: 6px 0;
  font-size: 13px;
}
.dept-person-name { color: var(--ink); font-weight: 500; }
.dept-person-pos { color: var(--ink-3); font-size: 11.5px; }
.dept-person-count {
  font-variant-numeric: tabular-nums;
  color: var(--ink-3);
  font-size: 12px;
  white-space: nowrap;
}
.dept-chips {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.dept-chip {
  font-size: 11px;
  padding: 2px 9px;
  background: var(--paper);
  border: 1px solid var(--paper-3);
  border-radius: 99px;
  color: var(--ink-2);
}

/* ========================================================================
   ALERT ROW — for ECP expiry & risks
   ======================================================================== */
.alert-row {
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: var(--card);
  border: 1px solid var(--paper-3);
  border-left: 3px solid var(--paper-3);
  border-radius: var(--radius);
  margin-bottom: 8px;
}
.alert-row.bad  { border-left-color: var(--bad); }
.alert-row.warn { border-left-color: var(--warn); }
.alert-row.info { border-left-color: var(--info); }
.alert-row.ok   { border-left-color: var(--ok); }
.alert-name { font-weight: 600; font-size: 14px; color: var(--ink); }
.alert-sub  { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
.alert-meta { font-size: 12px; color: var(--ink-3); white-space: nowrap; }
.alert-icon {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--paper-2);
  border-radius: 50%;
  color: var(--ink-3);
}
.alert-row.bad  .alert-icon { background: var(--bad-bg);  color: var(--bad-ink); }
.alert-row.warn .alert-icon { background: var(--warn-bg); color: var(--warn-ink); }
.alert-row.info .alert-icon { background: var(--info-bg); color: var(--info-ink); }
.alert-row.ok   .alert-icon { background: var(--ok-bg);   color: var(--ok-ink); }
.alert-icon svg { width: 15px; height: 15px; }

/* Filter chips (segmented) */
.seg {
  display: inline-flex;
  background: var(--paper-2);
  padding: 3px;
  border-radius: 8px;
  gap: 2px;
}
.seg-btn {
  padding: 5px 12px;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-3);
  border-radius: 5px;
  transition: all .15s;
  white-space: nowrap;
}
.seg-btn:hover { color: var(--ink-2); }
.seg-btn.active {
  background: var(--card);
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(26,23,20,.06);
}

/* Employee picker for recovery page */
.emp-picker {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.emp-pick-btn {
  padding: 8px 14px;
  background: var(--card);
  border: 1px solid var(--paper-3);
  border-radius: var(--radius);
  font-size: 13px;
  color: var(--ink-2);
  transition: all .15s;
}
.emp-pick-btn:hover { border-color: var(--ink-4); color: var(--ink); }
.emp-pick-btn.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

/* ========================================================================
   RESPONSIVE
   ======================================================================== */
.burger { display: none; }
@media (max-width: 960px) {
  .nav {
    transform: translateX(-100%);
    transition: transform .3s var(--ease);
    width: 280px;
  }
  .nav.open { transform: translateX(0); box-shadow: 0 0 48px rgba(0,0,0,.3); }
  .main { margin-left: 0; }
  .burger {
    display: inline-flex;
    padding: 6px;
    background: transparent;
    border: 1px solid var(--paper-3);
    border-radius: var(--radius);
  }
  .burger svg { width: 18px; height: 18px; }
  :root { --pad-x: 20px; --pad-y: 20px; }
  .topbar { padding: 16px var(--pad-x); flex-wrap: wrap; }
  .topbar-title { font-size: 26px; }
  .page { padding: 24px var(--pad-x) 60px; }
  .hero-stats { grid-template-columns: repeat(2, 1fr); }
  .hero-stat { border-right: 1px solid var(--paper-3); border-bottom: 1px solid var(--paper-3); }
  .hero-stat:nth-child(2n) { border-right: 0; }
  .hero-stat:nth-last-child(-n+2) { border-bottom: 0; }
  .hero-stat-num { font-size: 42px; }
}
@media (max-width: 600px) {
  .hero-stat-num { font-size: 36px; }
  .hero-stat { padding: 16px 20px; }
  .card-head { padding: 16px 18px; }
  .card-body { padding: 18px; }
  .topbar-title { font-size: 22px; }
}

/* ========================================================================
   PRINTABLE SHEETS — offboarding / onboarding overlay + print rules
   ======================================================================== */
.sheet-overlay {
  display: none;
  position: fixed; inset: 0;
  background: #E5E7E0;
  z-index: 200;
  overflow: auto;
  padding: 24px 12px 80px;
}
body.printing .sheet-overlay { display: block; }
body.printing { overflow: hidden; }

.sheet-toolbar {
  position: sticky; top: 0;
  display: flex; justify-content: flex-end; gap: 8px;
  max-width: 860px;
  margin: 0 auto 14px;
  padding: 10px 0;
  background: #E5E7E0;
  z-index: 2;
}
.sheet-page {
  max-width: 860px;
  margin: 0 auto;
  background: #FFFFFF;
  box-shadow: 0 4px 18px -8px rgba(0,0,0,.18);
  padding: 38px 46px;
  color: #1A1A1A;
  font-family: var(--font-body);
  font-size: 12.5px;
  line-height: 1.45;
}

.sheet-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  border-bottom: 2px solid #111;
  padding-bottom: 12px;
  margin-bottom: 22px;
}
.sheet-stamp {
  font-family: var(--font-display);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 2px;
}
.sheet-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 24px;
  letter-spacing: -.01em;
  color: #111;
}
.sheet-sub {
  font-size: 12px;
  color: #555;
  margin-top: 2px;
}
.sheet-head-right { text-align: right; }
.sheet-meta {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: #777;
}
.sheet-date {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 500;
}

.sheet-person {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 24px;
  margin-bottom: 22px;
  border: 1px solid #D8D8D4;
  border-radius: 8px;
  padding: 14px 18px;
  background: #FAFAF7;
}
.sheet-kv { display: flex; gap: 8px; align-items: baseline; }
.sheet-k {
  flex-shrink: 0;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: #777;
  font-weight: 600;
  min-width: 80px;
}
.sheet-v { flex: 1; font-weight: 500; color: #111; }
.sheet-blank {
  display: inline-block;
  min-width: 160px;
  border-bottom: 1px dotted #999;
  height: 1em;
}

.sheet-section { margin-bottom: 20px; break-inside: avoid; }
.sheet-h2 {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  color: #111;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.sheet-h2-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
}
.sheet-hint {
  font-size: 11.5px;
  color: #555;
  font-style: italic;
  margin-bottom: 6px;
}

.sheet-tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.sheet-tbl thead th {
  background: #F2F2EE;
  padding: 6px 8px;
  text-align: left;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: #555;
  font-weight: 600;
  border: 1px solid #DDD;
}
.sheet-tbl tbody td {
  padding: 7px 8px;
  border: 1px solid #DDD;
  vertical-align: top;
}
.sheet-num { text-align: center; color: #888; font-variant-numeric: tabular-nums; }
.sheet-cell-name { font-weight: 500; color: #111; }
.sheet-cell-sub { font-size: 11px; color: #777; margin-top: 2px; }
.sheet-cell-center { text-align: center; font-size: 14px; }
.sheet-empty {
  padding: 10px 12px;
  font-style: italic;
  color: #888;
  background: #FAFAF7;
  border: 1px dashed #D8D8D4;
  border-radius: 6px;
}
.sheet-check {
  list-style: none;
  padding: 0;
  font-size: 12.5px;
  line-height: 1.9;
  color: #111;
}
.sheet-check li { padding-left: 4px; }

.sheet-signs {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 28px 40px;
  margin-top: 30px;
  break-inside: avoid;
}
.sheet-sign { padding-top: 30px; }
.sheet-sign-line {
  border-bottom: 1px solid #555;
  height: 1px;
  margin-bottom: 6px;
}
.sheet-sign-role {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: #777;
  font-weight: 600;
}

@media (max-width: 520px) {
  .sheet-page { padding: 22px 18px; }
  .sheet-person { grid-template-columns: 1fr; }
  .sheet-signs { grid-template-columns: 1fr; }
}

/* ========================================================================
   PRINT
   ======================================================================== */
@media print {
  body { background: white; }
  .nav, .topbar, .nav-foot, .modal-bg, .toasts, .btn, .add-row, .cmdk-bg, .install-pill { display: none !important; }
  .main { margin-left: 0; }
  .page { display: block !important; padding: 0; }
  .page:not(.active) { display: none !important; }
  .card { border: 1px solid #ccc; break-inside: avoid; }
  .matrix-cell { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  /* printable sheet takes the whole page */
  body.printing .app,
  body.printing .modal-bg,
  body.printing .toasts { display: none !important; }
  body.printing .sheet-overlay {
    position: static; background: white; padding: 0; overflow: visible;
  }
  body.printing .sheet-toolbar { display: none !important; }
  body.printing .sheet-page {
    box-shadow: none; max-width: none; margin: 0; padding: 20mm;
  }
  .sheet-h2-num, .imp-badge, .sheet-stamp { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>

/* ---------------------------------------------------------------------------
   UNDO / REDO — runtime snapshot stack. Not persisted across reloads.
   Call snapshot('label') BEFORE any state mutation; undo() restores.
   --------------------------------------------------------------------------- */
const HISTORY_LIMIT = 20;
let history = { past: [], future: [] };

function snapshot(label) {
  const snap = {
    label,
    state: JSON.parse(JSON.stringify(state)),
    checklists: JSON.parse(JSON.stringify(checklists)),
    at: Date.now()
  };
  history.past.push(snap);
  if (history.past.length > HISTORY_LIMIT) history.past.shift();
  history.future = [];
}

function undo() {
  if (!history.past.length) { toast('Отменять нечего', 'bad'); return; }
  const prev = history.past.pop();
  history.future.push({
    label: prev.label,
    state: JSON.parse(JSON.stringify(state)),
    checklists: JSON.parse(JSON.stringify(checklists)),
    at: Date.now()
  });
  state = prev.state;
  checklists = prev.checklists;
  save();
  refreshSidebarCounts();
  goto(ui.currentPage);
  toast('Отменено: ' + (prev.label || 'последнее действие'));
}

function redo() {
  if (!history.future.length) { toast('Повторять нечего', 'bad'); return; }
  const next = history.future.pop();
  history.past.push({
    label: next.label,
    state: JSON.parse(JSON.stringify(state)),
    checklists: JSON.parse(JSON.stringify(checklists)),
    at: Date.now()
  });
  state = next.state;
  checklists = next.checklists;
  save();
  refreshSidebarCounts();
  goto(ui.currentPage);
  toast('Повторено: ' + (next.label || 'действие'));
}

/* ============================================================================
   ATTACHMENTS — files stored as base64 data-URLs inside the registry state.
   Conservative limits so localStorage doesn't blow up (~5–10 MB browser cap).
   ============================================================================ */
const ATTACH_MAX_BYTES = 3 * 1024 * 1024;       // hard per-file cap
const ATTACH_WARN_BYTES = 1.2 * 1024 * 1024;    // above this → "рекомендуем сжать"
const ATTACH_ACCEPT = 'image/*,application/pdf';

function fmtBytes(n) {
  if (n == null) return '—';
  if (n < 1024) return n + ' Б';
  if (n < 1024 * 1024) return (n / 1024).toFixed(0) + ' КБ';
  return (n / 1024 / 1024).toFixed(1) + ' МБ';
}

function attachIcon(type) {
  if (type?.startsWith('image/')) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
  }
  if (type === 'application/pdf') {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
  }
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>';
}

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(r.error);
    r.readAsDataURL(file);
  });
}

/* Renders the attachment grid into the given container.
   `getList` returns the current array; `setList` replaces it. */
function renderAttachmentsInto(container, getList, setList, opts = {}) {
  const list = getList();
  const readonly = !!opts.readonly;
  if (!container) return;
  if (!list.length) {
    container.innerHTML = `<div class="attach-empty">Пока нет файлов</div>`;
    return;
  }
  container.innerHTML = list.map((a, i) => {
    const isImage = (a.type || '').startsWith('image/');
    const preview = isImage
      ? `<img src="${a.dataUrl}" alt="${esc(a.name)}" loading="lazy">`
      : `<div class="attach-ic">${attachIcon(a.type)}</div>`;
    return `
      <div class="attach-card" data-idx="${i}">
        <a class="attach-thumb" href="${a.dataUrl}" download="${esc(a.name)}" target="_blank" rel="noopener">${preview}</a>
        <div class="attach-meta">
          <div class="attach-name" title="${esc(a.name)}">${esc(a.name)}</div>
          <div class="attach-sub">${esc((a.type || '').split('/')[1] || 'файл')} · ${fmtBytes(a.size)}</div>
        </div>
        ${readonly ? '' : `<button type="button" class="attach-del" data-idx="${i}" title="Удалить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>`}
      </div>`;
  }).join('');
  if (!readonly) {
    container.querySelectorAll('.attach-del').forEach(btn => {
      btn.addEventListener('click', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const idx = +btn.dataset.idx;
        const next = getList().slice();
        next.splice(idx, 1);
        setList(next);
        renderAttachmentsInto(container, getList, setList, opts);
      });
    });
  }
}

async function ingestFiles(files, getList, setList, onDone) {
  const list = getList().slice();
  let added = 0, skipped = 0;
  for (const file of files) {
    if (file.size > ATTACH_MAX_BYTES) {
      toast(`«${file.name}» больше ${fmtBytes(ATTACH_MAX_BYTES)} — не добавлено`, 'bad');
      skipped++;
      continue;
    }
    if (file.size > ATTACH_WARN_BYTES) {
      toast(`«${file.name}» — ${fmtBytes(file.size)}: большой файл, лучше сжать`);
    }
    try {
      const dataUrl = await readFileAsDataUrl(file);
      list.push({
        id: uid(),
        name: file.name,
        type: file.type || 'application/octet-stream',
        size: file.size,
        addedAt: new Date().toISOString(),
        dataUrl
      });
      added++;
    } catch (err) {
      toast(`Не удалось прочитать «${file.name}»`, 'bad');
      skipped++;
    }
  }
  if (added) {
    setList(list);
    if (onDone) onDone();
  }
  if (added) toast(`Добавлено ${added} ${plural(added,'файл','файла','файлов')}`);
}

function fuzzyMatch(query, text) {
  if (!query) return { score: 0, match: true };
  const q = query.toLowerCase().trim();
  const t = (text || '').toLowerCase();
  if (t.includes(q)) {
    return { score: 100 - t.indexOf(q), match: true };
  }
  // subsequence match
  let ti = 0, hits = 0;
  for (let qi = 0; qi < q.length; qi++) {
    const c = q[qi];
    const idx = t.indexOf(c, ti);
    if (idx === -1) return { score: 0, match: false };
    hits++;
    ti = idx + 1;
  }
  return { score: hits, match: true };
}

  input.value = '';
  renderCmdKList('');

}

function closeCmdK() {
  cmdk.open = false;
  $('#cmdkBg').classList.remove('open');
  document.body.style.overflow = '';
}

function renderCmdKList(query) {
  const list = $('#cmdkList');
  if (!list) return;
  let items;
  if (!query.trim()) {
    items = cmdk.items.slice(0, 40);
  } else {
    items = cmdk.items
      .map(it => {
        const hay = [it.title, it.sub, it.group].join(' ');
        const m = fuzzyMatch(query, hay);
        return m.match ? { ...it, _score: m.score } : null;
      })
      .filter(Boolean)
      .sort((a, b) => b._score - a._score)
      .slice(0, 40);
  }
  cmdk.filtered = items;
  if (cmdk.active >= items.length) cmdk.active = 0;

  if (!items.length) {
    list.innerHTML = '<div class="cmdk-empty">Ничего не найдено</div>';
    return;
  }

  let html = '';
  let lastGroup = null;
  items.forEach((it, i) => {
    if (it.group !== lastGroup) {
      html += `<div class="cmdk-section-label">${esc(it.group)}</div>`;
      lastGroup = it.group;
    }
    html += `
      <div class="cmdk-item ${i === cmdk.active ? 'active' : ''}" data-idx="${i}">
        <div class="cmdk-icon">${CMDK_ICONS[it.icon] || CMDK_ICONS.page}</div>
        <div class="cmdk-item-body">
          <div class="cmdk-item-title">${esc(it.title)}</div>
          <div class="cmdk-item-sub">${esc(it.sub || '')}</div>
        </div>
        ${it.badge ? `<span class="cmdk-badge">${esc(it.badge)}</span>` : ''}
      </div>`;
  });
  list.innerHTML = html;
  list.querySelectorAll('.cmdk-item').forEach(el => {
    el.addEventListener('mouseenter', () => {
      cmdk.active = +el.dataset.idx;
      list.querySelectorAll('.cmdk-item').forEach((x,i) => x.classList.toggle('active', i === cmdk.active));
    });
    el.addEventListener('click', () => {
      const it = cmdk.filtered[+el.dataset.idx];
      if (it) { closeCmdK(); setTimeout(() => it.run(), 0); }
    });
  });
  const active = list.querySelector('.cmdk-item.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function cmdKKey(ev) {
  if (!cmdk.open) return;
  if (ev.key === 'ArrowDown') {
    ev.preventDefault();
    cmdk.active = Math.min(cmdk.filtered.length - 1, cmdk.active + 1);
    renderCmdKList($('#cmdkInput').value);
  } else if (ev.key === 'ArrowUp') {
    ev.preventDefault();
    cmdk.active = Math.max(0, cmdk.active - 1);
    renderCmdKList($('#cmdkInput').value);
  } else if (ev.key === 'Enter') {
    ev.preventDefault();
    const it = cmdk.filtered[cmdk.active];
    if (it) { closeCmdK(); setTimeout(() => it.run(), 0); }
  } else if (ev.key === 'Escape') {
    ev.preventDefault();
    closeCmdK();
  }
}

/* Generic wiring for an attachments section on any page.
   - `grid` / `drop` / `input` are selectors
   - `get()` returns current list, `set(list)` replaces it */
function wireAttachmentsUI({ grid, drop, input, get, set, readonly }) {
  const gridEl = $(grid);
  const dropEl = drop && $(drop);
  const inputEl = input && $(input);
  renderAttachmentsInto(gridEl, get, set, { readonly });
  if (readonly) return;

  const refresh = () => renderAttachmentsInto(gridEl, get, set, { readonly });

  if (inputEl) {
    inputEl.onchange = async (ev) => {
      const files = [...(ev.target.files || [])];
      if (!files.length) return;
      await ingestFiles(files, get, set, refresh);
      inputEl.value = '';
    };
  }
  if (dropEl) {
    dropEl.addEventListener('dragover', (ev) => {
      ev.preventDefault();
      dropEl.classList.add('drag');
    });
    dropEl.addEventListener('dragleave', () => dropEl.classList.remove('drag'));
    dropEl.addEventListener('drop', async (ev) => {
      ev.preventDefault();
      dropEl.classList.remove('drag');
      const files = [...(ev.dataTransfer?.files || [])];
      if (files.length) await ingestFiles(files, get, set, refresh);
    });
  }
}

/* ---------------------------------------------------------------------------
   LEAVING SIMULATOR — "что будет, если X уйдёт"
   --------------------------------------------------------------------------- */
function computeLeaveImpact(empId) {
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) return null;
  const others = state.employees.filter(e => e.id !== empId);

  const orphanSystems = [];       // nobody else uses
  const nowSoleSystems = [];      // one other becomes sole owner
  const degradedSystems = [];     // 2+ others remain but the leaver was a main user

  (emp.systems || []).forEach(s => {
    const otherUsers = others.filter(e =>
      (e.systems || []).some(x => systemKey(x.name) === systemKey(s.name))
    );
    const meta = state.systems.find(x => systemKey(x.name) === systemKey(s.name));
    const entry = {
      name: s.name,
      purpose: s.purpose,
      frequency: s.frequency,
      priority: meta?.priority || 'important',
      requiresEcp: meta?.requiresEcp,
      otherUsers
    };
    if (otherUsers.length === 0) orphanSystems.push(entry);
    else if (otherUsers.length === 1) nowSoleSystems.push(entry);
    else if (s.frequency === 'main') degradedSystems.push(entry);
  });

  // Newly-sole owners (people who become single carrier after leaving)
  const newSoleByEmp = {};
  nowSoleSystems.forEach(sys => {
    const u = sys.otherUsers[0];
    newSoleByEmp[u.id] ||= { emp: u, systems: [] };
    newSoleByEmp[u.id].systems.push(sys);
  });
  const newSoleOwners = Object.values(newSoleByEmp)
    .sort((a,b) => b.systems.length - a.systems.length);

  // ECPs that need revocation/transfer
  const ecpsToHandle = (emp.ecps || []).filter(c => c.type);
  const hasCrypto = !!(emp.cryptoVersion || emp.cryptoExpiry);

  // Severity scoring
  const criticalOrphans = orphanSystems.filter(s => s.priority === 'critical').length;
  let severity = 'ok';
  if (criticalOrphans > 0 || orphanSystems.length >= 3) severity = 'bad';
  else if (orphanSystems.length > 0 || newSoleOwners.some(x => x.systems.some(s => s.priority === 'critical'))) severity = 'warn';
  else if (nowSoleSystems.length > 0) severity = 'info';

  return { emp, orphanSystems, nowSoleSystems, degradedSystems, newSoleOwners, ecpsToHandle, hasCrypto, severity, criticalOrphans };
}

function simulateLeave(empId) {
  const r = computeLeaveImpact(empId);
  if (!r) { toast('Сотрудник не найден', 'bad'); return; }
  const severityLabel = {
    bad:  { text: 'Критическое влияние', bg: 'var(--bad-bg)',  ink: 'var(--bad-ink)' },
    warn: { text: 'Заметное влияние',    bg: 'var(--warn-bg)', ink: 'var(--warn-ink)' },
    info: { text: 'Ограниченное влияние',bg: 'var(--info-bg)', ink: 'var(--info-ink)' },
    ok:   { text: 'Безболезненно',        bg: 'var(--ok-bg)',   ink: 'var(--ok-ink)' }
  }[r.severity];

  const sysRow = (s) => `
    <li class="sim-sys-item">
      <span class="sim-sys-dot ${s.priority === 'critical' ? 'bad' : s.priority === 'important' ? 'warn' : 'ok'}"></span>
      <span class="sim-sys-name">${esc(s.name)}${s.priority === 'critical' ? ' <span class="badge b-bad plain" style="padding:1px 5px;font-size:10px;margin-left:2px">критичная</span>' : ''}</span>
      <span class="sim-sys-hint">${esc(s.purpose || '—')}</span>
    </li>`;

  const body = `
    <div class="sim-hero" style="background:${severityLabel.bg};color:${severityLabel.ink}">
      <div class="sim-hero-label">${severityLabel.text}</div>
      <div class="sim-hero-num num">${r.orphanSystems.length + r.nowSoleSystems.length}</div>
      <div class="sim-hero-hint">${r.orphanSystems.length ? `${r.orphanSystems.length} бесхозных + ` : ''}${r.nowSoleSystems.length} систем с новым единственным носителем</div>
    </div>

    <div class="sim-grid">
      <div class="sim-block">
        <div class="sim-block-head">
          <span class="sim-block-icon bad">⨯</span>
          <div>
            <div class="sim-block-title">Бесхозные системы</div>
            <div class="sim-block-hint">Никто другой не использует</div>
          </div>
          <div class="sim-block-num num">${r.orphanSystems.length}</div>
        </div>
        ${r.orphanSystems.length ? `<ul class="sim-sys-list">${r.orphanSystems.map(sysRow).join('')}</ul>` : '<div class="sim-block-empty">— нет</div>'}
      </div>

      <div class="sim-block">
        <div class="sim-block-head">
          <span class="sim-block-icon warn">!</span>
          <div>
            <div class="sim-block-title">Станут единственным носителем</div>
            <div class="sim-block-hint">У оставшихся вырастет фактор риска</div>
          </div>
          <div class="sim-block-num num">${r.newSoleOwners.length}</div>
        </div>
        ${r.newSoleOwners.length ? `
          <ul class="sim-sys-list">
            ${r.newSoleOwners.map(x => `
              <li class="sim-sys-item">
                <span class="sim-sys-dot info"></span>
                <span class="sim-sys-name">${esc(shortName(x.emp.fullName))} <span class="sub" style="font-weight:normal;color:var(--ink-3);font-size:11.5px">· ${esc(x.emp.department || '—')}</span></span>
                <span class="sim-sys-hint">будет один по: ${x.systems.map(s => esc(s.name)).join(', ')}</span>
              </li>
            `).join('')}
          </ul>
        ` : '<div class="sim-block-empty">— нет</div>'}
      </div>

      ${r.degradedSystems.length ? `
      <div class="sim-block">
        <div class="sim-block-head">
          <span class="sim-block-icon info">↓</span>
          <div>
            <div class="sim-block-title">Снижение мощности</div>
            <div class="sim-block-hint">Был основным пользователем, остаются редкие</div>
          </div>
          <div class="sim-block-num num">${r.degradedSystems.length}</div>
        </div>
        <ul class="sim-sys-list">${r.degradedSystems.map(sysRow).join('')}</ul>
      </div>` : ''}

      ${r.ecpsToHandle.length || r.hasCrypto ? `
      <div class="sim-block">
        <div class="sim-block-head">
          <span class="sim-block-icon">🔑</span>
          <div>
            <div class="sim-block-title">Криптография — отозвать/передать</div>
            <div class="sim-block-hint">ЭЦП и лицензии сотрудника</div>
          </div>
          <div class="sim-block-num num">${r.ecpsToHandle.length + (r.hasCrypto ? 1 : 0)}</div>
        </div>
        <ul class="sim-sys-list">
          ${r.ecpsToHandle.map(c => `
            <li class="sim-sys-item">
              <span class="sim-sys-dot warn"></span>
              <span class="sim-sys-name">${esc(c.type)}</span>
              <span class="sim-sys-hint">до ${fmtDate(c.expiry)}</span>
            </li>
          `).join('')}
          ${r.hasCrypto ? `
            <li class="sim-sys-item">
              <span class="sim-sys-dot warn"></span>
              <span class="sim-sys-name">Лицензия КриптоПро ${esc(r.emp.cryptoVersion || '')}</span>
              <span class="sim-sys-hint">${r.emp.cryptoExpiry ? 'до ' + fmtDate(r.emp.cryptoExpiry) : 'без даты'}</span>
            </li>
          ` : ''}
        </ul>
      </div>` : ''}
    </div>

    <div class="sim-plan">
      <div class="sim-plan-title">План передачи дел</div>
      <ol>
        ${r.orphanSystems.length ? `<li>Назначить ответственного за бесхозные системы (${r.orphanSystems.length}): провести обучение, передать учётки, описать рабочие процессы.</li>` : ''}
        ${r.nowSoleSystems.length ? `<li>По ${r.nowSoleSystems.length} ${plural(r.nowSoleSystems.length,'системе','системам','системам')} ввести резервного пользователя — иначе после ухода каждый из них превратится в новую уязвимость.</li>` : ''}
        ${r.ecpsToHandle.length ? `<li>Отозвать ${r.ecpsToHandle.length} ${plural(r.ecpsToHandle.length,'ключ ЭЦП','ключа ЭЦП','ключей ЭЦП')}, перевыпустить на преемника.</li>` : ''}
        ${r.hasCrypto ? `<li>Передать/переустановить лицензию КриптоПро CSP на АРМ ${esc(r.emp.armId || 'преемника')}.</li>` : ''}
        <li>Собрать чек-лист восстановления АРМ для преемника: ОС, VPN, доступы к системам, контакты.</li>
        ${r.severity === 'bad' ? '<li style="color:var(--bad-ink);font-weight:500">Уход без подготовки невозможен — критические системы останутся без владельца.</li>' : ''}
      </ol>
    </div>
  `;

  openModal({
    title: 'Симулятор: «если уйдёт ' + r.emp.fullName + '»',
    sub: (r.emp.position || '—') + ' · ' + (r.emp.department || '—'),
    body,
    footer: `
      <button class="btn" onclick="closeModal()">Закрыть</button>
      <button class="btn" onclick="closeModal(); ui.recoveryEmpId='${r.emp.id}'; goto('recovery')">Чек-лист восстановления</button>
      <button class="btn btn-primary" onclick="closeModal(); ui.editingEmployeeId='${r.emp.id}'; goto('survey')">Открыть анкету</button>
    `
  });
}

/* ============================================================================
   ============================ PAGE: EMPLOYEES ===============================
   ============================================================================ */
function renderEmployeesPage(root) {
  const sortKey = ui.sortBy || 'fullName';
  const dir = ui.sortDir === 'desc' ? -1 : 1;
  const query = (ui.search.emp || '').toLowerCase();

  let list = state.employees.filter(e => {
    if (!query) return true;
    return [e.fullName, e.position, e.department].join(' ').toLowerCase().includes(query);
  });

  list.sort((a, b) => {
    let va, vb;
    switch (sortKey) {
      case 'systems': va = a.systems?.length || 0; vb = b.systems?.length || 0; break;
      case 'ecps':    va = a.ecps?.length || 0;    vb = b.ecps?.length || 0;    break;
      case 'department': va = a.department || ''; vb = b.department || ''; break;
      case 'position': va = a.position; vb = b.position; break;
      default: va = a.fullName; vb = b.fullName;
    }
    if (typeof va === 'number') return (va - vb) * dir;
    return String(va).localeCompare(String(vb), 'ru') * dir;
  });

  const totalSys = state.employees.reduce((s,e) => s + (e.systems?.length || 0), 0);
  const avgSys = state.employees.length ? (totalSys / state.employees.length).toFixed(1) : '0';

  root.innerHTML = `
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-label">Сотрудников</div>
        <div class="hero-stat-num num">${state.employees.length}</div>
        <div class="hero-stat-hint">Заполнено анкет</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label">Всего систем</div>
        <div class="hero-stat-num num">${totalSys}</div>
        <div class="hero-stat-hint">Связей «сотрудник → система»</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label">Средняя загрузка</div>
        <div class="hero-stat-num num">${avgSys}<span class="suffix">сист.</span></div>
        <div class="hero-stat-hint">На одного сотрудника</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label">Отделов</div>
        <div class="hero-stat-num num">${new Set(state.employees.map(e => e.department).filter(Boolean)).size}</div>
        <div class="hero-stat-hint">Представленных в реестре</div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div>
          <h2>Реестр <em>сотрудников</em></h2>
          <div class="sub mt-1">Кликните по строке для редактирования анкеты</div>
        </div>
        <div class="row gap-2">
          <div class="search" style="width:260px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="input" placeholder="Поиск по ФИО, должности…" value="${esc(query)}" oninput="ui.search.emp=this.value; renderEmployeesPage(document.querySelector('#page-employees'))">
          </div>
          <button class="btn btn-accent" onclick="newSurvey()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Добавить
          </button>
        </div>
      </div>
      ${list.length === 0 ? emptyState('Никто не подошёл под запрос', 'Попробуйте изменить поиск или добавьте нового сотрудника.', 'user') : `
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th class="sortable ${sortKey==='fullName'?'sorted':''}" onclick="setSort('fullName')">ФИО <span class="sort-ind">${sortKey==='fullName'?(dir>0?'↑':'↓'):'↕'}</span></th>
              <th class="sortable ${sortKey==='position'?'sorted':''}" onclick="setSort('position')">Должность <span class="sort-ind">${sortKey==='position'?(dir>0?'↑':'↓'):'↕'}</span></th>
              <th class="sortable ${sortKey==='department'?'sorted':''}" onclick="setSort('department')">Отдел <span class="sort-ind">${sortKey==='department'?(dir>0?'↑':'↓'):'↕'}</span></th>
              <th class="sortable ${sortKey==='systems'?'sorted':''}" onclick="setSort('systems')" style="text-align:center">Системы <span class="sort-ind">${sortKey==='systems'?(dir>0?'↑':'↓'):'↕'}</span></th>
              <th class="sortable ${sortKey==='ecps'?'sorted':''}" onclick="setSort('ecps')" style="text-align:center">ЭЦП <span class="sort-ind">${sortKey==='ecps'?(dir>0?'↑':'↓'):'↕'}</span></th>
              <th style="text-align:center">КриптоПро</th>
              <th style="text-align:center">Загрузка</th>
              <th class="actions"></th>
            </tr>
          </thead>
          <tbody>
            ${list.map(e => {
              const sys = e.systems?.length || 0;
              const load = loadLevel(sys);
              const cp = CRYPTO_STATUS[e.cryptoStatus] || CRYPTO_STATUS.not_installed;
              return `
                <tr onclick="editEmployee('${e.id}')" style="cursor:pointer">
                  <td class="name">${esc(e.fullName)}</td>
                  <td>${esc(e.position)}</td>
                  <td class="muted">${esc(e.department || '—')}</td>
                  <td style="text-align:center"><span class="badge b-neutral num">${sys}</span></td>
                  <td style="text-align:center"><span class="badge b-neutral num">${e.ecps?.length || 0}</span></td>
                  <td style="text-align:center"><span class="badge b-${cp.tone}">${cp.label}</span></td>
                  <td style="text-align:center"><span class="badge b-${load.tone}">${load.label}</span></td>
                  <td class="actions" onclick="event.stopPropagation()">
                    <button class="btn btn-ghost btn-icon" onclick="editEmployee('${e.id}')" title="Редактировать">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button class="btn btn-ghost btn-icon btn-danger" onclick="deleteEmployee('${e.id}')" title="Удалить">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                    </button>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
      `}
    </div>
  `;
}

function setSort(key) {
  if (ui.sortBy === key) ui.sortDir = ui.sortDir === 'asc' ? 'desc' : 'asc';
  else { ui.sortBy = key; ui.sortDir = 'asc'; }
  goto(ui.currentPage);
}

function editEmployee(id) {
  ui.editingEmployeeId = id;
  goto('survey');
}

function loadLevel(sysCount) {
  if (sysCount >= 7) return { label: 'Высокая', tone: 'bad' };
  if (sysCount >= 4) return { label: 'Средняя', tone: 'warn' };
  if (sysCount >= 1) return { label: 'Низкая',  tone: 'ok' };
  return { label: '—', tone: 'neutral' };
}

/* ============================================================================
   ============================== PAGE: SYSTEMS ===============================
   ============================================================================ */
function renderSystemsPage(root) {
  const query  = (ui.search.sys || '').toLowerCase();
  const filter = ui.sysFilter || 'all';
  const sortBy = ui.sysSort   || 'users';

  const enriched = state.systems.map(s => {
    const users = state.employees.filter(e =>
      e.systems?.some(x => systemKey(x.name) === systemKey(s.name))
    );
    return { ...s, users };
  });

  const counts = {
    all:      enriched.length,
    critical: enriched.filter(s => s.priority === 'critical').length,
    ecp:      enriched.filter(s => s.requiresEcp).length,
    orphan:   enriched.filter(s => s.users.length === 0).length
  };

  const filtered = enriched.filter(s => {
    if (query && !s.name.toLowerCase().includes(query)) return false;
    if (filter === 'critical') return s.priority === 'critical';
    if (filter === 'ecp')      return s.requiresEcp;
    if (filter === 'orphan')   return s.users.length === 0;
    return true;
  });

  const prioOrder = { critical: 0, important: 1, nice: 2 };
  const list = filtered.sort((a, b) => {
    if (sortBy === 'name')     return a.name.localeCompare(b.name, 'ru');
    if (sortBy === 'priority') return (prioOrder[a.priority] ?? 3) - (prioOrder[b.priority] ?? 3)
                                       || b.users.length - a.users.length;
    return b.users.length - a.users.length; // default: by load
  });

  root.innerHTML = `
    <div class="sys-strip">
      <div class="sys-strip-cell">
        <div class="n num">${counts.all}</div>
        <div class="l">Всего систем</div>
      </div>
      <div class="sys-strip-cell bad">
        <div class="n num">${counts.critical}</div>
        <div class="l">Критичных</div>
      </div>
      <div class="sys-strip-cell accent">
        <div class="n num">${counts.ecp}</div>
        <div class="l">Требуют ЭЦП</div>
      </div>
      <div class="sys-strip-cell warn">
        <div class="n num">${counts.orphan}</div>
        <div class="l">Без пользователей</div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div>
          <h2>Картотека <em>систем</em></h2>
          <div class="sub mt-1">Каждая система привязана к чек-листу восстановления и пользователям</div>
        </div>
        <div class="row gap-2" style="flex-wrap:wrap">
          <div class="search" style="width:240px;max-width:100%">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="input" placeholder="Найти систему…" value="${esc(query)}" oninput="ui.search.sys=this.value; renderSystemsPage(document.querySelector('#page-systems'))">
          </div>
          <button class="btn btn-accent" onclick="editSystem(null)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Новая система
          </button>
        </div>
      </div>
      <div class="card-body">
        <div class="sys-toolbar">
          <div class="sys-pills" role="tablist">
            ${sysPill('all',      'Все',          counts.all,      filter)}
            ${sysPill('critical', 'Критичные',    counts.critical, filter)}
            ${sysPill('ecp',      'Требуют ЭЦП',  counts.ecp,      filter)}
            ${sysPill('orphan',   'Бесхозные',    counts.orphan,   filter)}
          </div>
          <label class="sys-sort">
            <span>Сортировка</span>
            <select onchange="ui.sysSort=this.value; renderSystemsPage(document.querySelector('#page-systems'))">
              <option value="users"    ${sortBy==='users'    ?'selected':''}>по загрузке</option>
              <option value="priority" ${sortBy==='priority' ?'selected':''}>по приоритету</option>
              <option value="name"     ${sortBy==='name'     ?'selected':''}>по названию</option>
            </select>
          </label>
        </div>

        ${list.length === 0
          ? emptyState({
              title: counts.all === 0 ? 'Нет систем' : 'Ничего не найдено',
              text:  counts.all === 0
                ? 'Добавьте систему вручную или заполните анкеты сотрудников — системы подтянутся автоматически.'
                : 'Попробуйте изменить запрос или снять фильтр.',
              action: counts.all === 0
                ? '<button class="btn btn-accent mt-3" onclick="editSystem(null)">Добавить систему</button>'
                : `<button class="btn mt-3" onclick="ui.sysFilter='all'; ui.search.sys=''; renderSystemsPage(document.querySelector('#page-systems'))">Сбросить фильтр</button>`
            })
          : `<div class="sys-grid">
              ${list.map(renderSystemCard).join('')}
          </div>`
        }
      </div>
    </div>
  `;
}

function sysPill(key, label, count, active) {
  return `<button type="button" class="sys-pill ${active===key?'active':''}"
            onclick="ui.sysFilter='${key}'; renderSystemsPage(document.querySelector('#page-systems'))">
            ${esc(label)}<span class="sys-pill-count num">${count}</span>
          </button>`;
}

function renderSystemCard(s) {
  const prio = PRIORITY[s.priority] || PRIORITY.important;

  // Show "main" (primary) owners first, so they appear at the head of the list.
  const sortedUsers = [...s.users].sort((a, b) => {
    const aMain = a.systems.some(x => systemKey(x.name) === systemKey(s.name) && x.frequency === 'main');
    const bMain = b.systems.some(x => systemKey(x.name) === systemKey(s.name) && x.frequency === 'main');
    return (bMain ? 1 : 0) - (aMain ? 1 : 0);
  });

  // Compact, human-readable list of owners: "Иванов И.И., Петров П.И., …"
  // Primary owner is highlighted in accent color. List is clamped to 2 lines.
  const peopleHtml = sortedUsers.map(u => {
    const isMain = u.systems.some(x => systemKey(x.name) === systemKey(s.name) && x.frequency === 'main');
    const name = esc(shortName(u.fullName));
    return isMain
      ? `<span class="sys-person sys-person--main" title="${esc(u.fullName)} · основной">${name}</span>`
      : `<span class="sys-person" title="${esc(u.fullName)}">${name}</span>`;
  }).join(', ');

  const usersBlock = s.users.length === 0
    ? `<span class="orphan-badge" title="Систему никто не использует">Бесхозная</span>`
    : `<div class="sys-card__people" aria-label="Пользователи системы">${peopleHtml}</div>`;

  const usersCountText = s.users.length
    ? `${s.users.length} ${plural(s.users.length,'пользователь','пользователя','пользователей')}`
    : 'Нет пользователей';

  return `
    <article class="sys-card" data-priority="${esc(s.priority)}" onclick="editSystem('${s.id}')" tabindex="0"
             onkeydown="if(event.key==='Enter'){editSystem('${s.id}')}">
      <div class="sys-card__flag" aria-hidden="true"></div>

      <div class="sys-card__top">
        <div class="sys-card__title-wrap">
          <h3 class="sys-card__title">${esc(s.name)}</h3>
          <div class="sys-card__meta">
            <span class="sys-tag sys-tag--type">${esc(s.type)}</span>
            <span class="sys-tag sys-tag--${s.priority}">${esc(prio.label)}</span>
            ${s.requiresEcp ? `<span class="sys-tag sys-tag--ecp">ЭЦП</span>` : ''}
          </div>
        </div>
        <div class="sys-card__actions" onclick="event.stopPropagation()">
          <button class="sys-card__action" onclick="editSystem('${s.id}')" aria-label="Редактировать" title="Редактировать">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="sys-card__action danger" onclick="deleteSystem('${s.id}')" aria-label="Удалить" title="Удалить">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          </button>
        </div>
      </div>

      <div class="sys-card__users">
        <div class="sys-card__users-count ${s.users.length===0?'orphan':''} num">${usersCountText}</div>
        <div class="sys-card__users-hint">${
          s.users.length
            ? (s.users.some(u => u.systems.find(x => systemKey(x.name)===systemKey(s.name))?.frequency === 'main')
                ? 'Есть основной владелец'
                : 'Нет основного владельца')
            : 'Назначьте ответственного'
        }</div>
        ${usersBlock}
      </div>
    </article>
  `;
}

function initials(fullName) {
  const parts = (fullName || '').trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return '··';
  if (parts.length === 1) return parts[0].slice(0, 2);
  return (parts[0][0] || '') + (parts[1][0] || '');
}

function shortName(fullName) {
  const parts = (fullName || '').trim().split(/\s+/);
  if (parts.length < 2) return fullName;
  return parts[0] + ' ' + parts[1].charAt(0) + '.' + (parts[2] ? parts[2].charAt(0)+'.' : '');
}

  const s = id ? state.systems.find(x => x.id === id) : null;
  openModal({

    sub: s ? s.name : 'Заполните данные о новой системе в картотеке',
    body: `
      <div class="grid" style="gap:14px;grid-template-columns:1fr 1fr">

          <input class="input" id="mName" placeholder="Например: СБИС" value="${esc(s?.name || '')}">
        </div>
        <div class="field">
          <label class="label">Тип</label>
          <select class="select" id="mType">
            <option ${s?.type==='WEB'?'selected':''} value="WEB">WEB</option>
            <option ${s?.type==='Desktop'?'selected':''} value="Desktop">Desktop</option>
            <option ${s?.type==='Mobile'?'selected':''} value="Mobile">Mobile</option>
          </select>
        </div>
        <div class="field">
          <label class="label">Приоритет</label>
          <select class="select" id="mPriority">
            ${Object.entries(PRIORITY).map(([k,v]) => `<option value="${k}" ${s?.priority===k?'selected':''}>${v.label}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="grid-column:1/-1">
          <label class="label" style="display:flex;gap:8px;align-items:center;cursor:pointer;text-transform:none;letter-spacing:0;font-size:13px;color:var(--ink)">
            <input type="checkbox" id="mRequiresEcp" ${s?.requiresEcp?'checked':''} style="width:16px;height:16px;accent-color:var(--accent)">

  const existingNames = new Set(

  (t.systems || []).forEach(s => {

  });
  if (t.notes && !$('#sNotes').value.trim()) {

  }
  updateSysCount();

function applyTemplateConfirm(tplId) {
  const t = state.templates.find(x => x.id === tplId);
  if (!t) return;
  const target = $('#tplTarget').value;
  const merge = $('#tplMerge').checked;
  closeModal();
  if (target === '__new__') {
    ui.editingEmployeeId = null;
    goto('survey');
    setTimeout(() => applyTemplateToForm(t, merge), 50);
    toast('Шаблон «' + t.name + '» применён к новой анкете');
  } else {
    const emp = state.employees.find(e => e.id === target);
    if (!emp) return;
    snapshot('Применение шаблона «' + t.name + '» к ' + emp.fullName);
    const existing = merge ? (emp.systems || []) : [];
    const keys = new Set(existing.map(s => systemKey(s.name)));
    const added = t.systems.filter(s => !keys.has(systemKey(s.name)));
    emp.systems = [...existing, ...added];
    if (t.requiresEcp && !(emp.ecps || []).length) { emp.ecps = [{ type: '', expiry: '' }]; }
    if (t.notes && !emp.notes) emp.notes = t.notes;
    save();
    ui.editingEmployeeId = emp.id;
    goto('survey');
    toast('Добавлено ' + added.length + ' ' + plural(added.length,'система','системы','систем') + ' из «' + t.name + '»');
  }
}

function applyTemplateToSurvey(tplId) {
  // from command palette — apply to current editing or new
  const t = state.templates.find(x => x.id === tplId);
  if (!t) return;
  if (ui.currentPage !== 'survey') goto('survey');
  setTimeout(() => applyTemplateToForm(t, true), 30);

function applyTemplateToForm(t, merge) {
  // Add rows into the already-rendered survey form
  if (!merge) {
    $('#sysBody').innerHTML = '';
  }
  const existingNames = new Set(
    $$('#sysBody .sys-name').map(i => systemKey(i.value)).filter(Boolean)

  (t.systems || []).forEach(s => {
    if (!existingNames.has(systemKey(s.name))) {

    }
  });
  if (t.notes && !$('#sNotes').value.trim()) {
    $('#sNotes').value = t.notes;

  updateSysCount();
}

  const alertCount = countEcpAlerts();

  // Top systems by usage
  const sysUsage = {};
  emp.forEach(e => (e.systems || []).forEach(s => {
    const key = systemKey(s.name);
    if (!key) return;
    sysUsage[key] = sysUsage[key] || { name: s.name, count: 0, main: 0 };
    sysUsage[key].count++;

function getCSS(varName) {
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

function countEcpAlerts() {
  let n = 0;
  state.employees.forEach(e => {
    (e.ecps || []).forEach(c => {
      const d = daysLeft(c.expiry);
      if (d != null && d <= 90) n++;
    });
    if (e.cryptoExpiry) {
      const d = daysLeft(e.cryptoExpiry);
      if (d != null && d <= 90) n++;
    }
  });
  return n;
}

function ecpBreakdown() {
  let active = 0, expiring = 0, expired = 0, none = 0;
  state.employees.forEach(e => {
    if (!e.ecps || e.ecps.length === 0) { none++; return; }
    e.ecps.forEach(c => {
      const d = daysLeft(c.expiry);
      if (d == null) none++;
      else if (d < 0) expired++;
      else if (d <= 90) expiring++;
      else active++;
    });
  });
  return { active, expiring, expired, none };
}

function cycleMatrix(empId, sysName) {
  const e = state.employees.find(x => x.id === empId);
  if (!e) return;
  e.systems ||= [];
  const idx = e.systems.findIndex(s => systemKey(s.name) === systemKey(sysName));
  if (idx < 0) {
    // none -> main
    e.systems.push({ name: sysName, purpose: '', frequency: 'main' });
    // auto-register system
    if (!state.systems.some(s => systemKey(s.name) === systemKey(sysName))) {
      state.systems.push({
        id: uid(), name: sysName, type: 'WEB', priority: 'important',
        requiresEcp: false, notes: '',
        recoverySteps: DEFAULT_RECOVERY_STEPS.map(x => ({...x}))
      });
    }
  } else {
    const cur = e.systems[idx].frequency;
    // main -> periodic -> rare -> none
    if (cur === 'main') e.systems[idx].frequency = 'periodic';
    else if (cur === 'periodic') e.systems[idx].frequency = 'rare';
    else e.systems.splice(idx, 1);
  }
  save();
  refreshSidebarCounts();
  renderMatrixPage($('#page-matrix'));
}

   ============================================================================ */
function renderEcpPage(root) {
  // Build flat list of all ECP records + CryptoPro licenses
  const records = [];
  state.employees.forEach(e => {
    (e.ecps || []).forEach(c => {
      records.push({ kind: 'ecp', emp: e, type: c.type, expiry: c.expiry });
    });
    if (e.cryptoExpiry || e.cryptoVersion) {
      records.push({ kind: 'crypto', emp: e, type: `КриптоПро CSP ${e.cryptoVersion || ''}`, expiry: e.cryptoExpiry, status: e.cryptoStatus });
    }
  });

  // Categorize
  const expired = [], soon = [], warn = [], ok = [];
  records.forEach(r => {
    const d = daysLeft(r.expiry);
    r.days = d;
    if (d == null) ok.push(r);
    else if (d < 0) expired.push(r);
    else if (d <= 30) soon.push(r);
    else if (d <= 90) warn.push(r);
    else ok.push(r);
  });
  expired.sort((a,b) => (a.days || 0) - (b.days || 0));
  soon.sort((a,b) => a.days - b.days);
  warn.sort((a,b) => a.days - b.days);

  const tone = (r) => r.days == null ? 'info' : r.days < 0 ? 'bad' : r.days <= 30 ? 'bad' : r.days <= 90 ? 'warn' : 'ok';
  const icon = {
    bad:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>',
    warn: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
    ok:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
    info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
  };
  const rowHtml = (r) => {
    const t = tone(r);
    const daysText = r.days == null ? 'без срока' :
      r.days < 0 ? `просрочено на ${Math.abs(r.days)} ${plural(Math.abs(r.days),'день','дня','дней')}` :
      r.days === 0 ? 'сегодня' :
      `осталось ${r.days} ${plural(r.days,'день','дня','дней')}`;
    return `
      <div class="alert-row ${t}">
        <span class="alert-icon">${icon[t]}</span>
        <div>
          <div class="alert-name">${esc(r.type || '—')} ${r.kind === 'crypto' ? '<span class="badge b-accent plain" style="margin-left:6px;padding:1px 6px;font-size:10px">лицензия</span>' : ''}</div>
          <div class="alert-sub">${esc(shortName(r.emp.fullName))} · ${esc(r.emp.department || '—')}</div>
        </div>
        <span class="alert-meta num">${fmtDate(r.expiry)}</span>
        <span class="badge b-${t === 'info' ? 'neutral' : t}">${daysText}</span>
      </div>`;
  };

  // ---- Radar timeline ----
  // X axis: columns at 0% (past edge), 10% today, 24% (~30 days), 48% (~90 days),
  // 72% (~180 days), 100% (360+ days). Dots are plotted by daysLeft.
  const radarHtml = (() => {
    const dated = records.filter(r => r.days != null);
    if (!dated.length) {
      return `<div class="radar-card">
        <div class="radar-head"><h3>Радар <em>сроков</em></h3><div class="radar-head-hint">Нет записей с датой</div></div>
        <div class="radar-empty">Заполните даты истечения в анкетах — появится карта сроков</div>
      </div>`;
    }
    // Map daysLeft -> pct.
    // Left edge (0%) = -90 days or earlier. 10% = сегодня. 24% = +30. 48% = +90. 72% = +180. 100% = +365+.
    const dayToPct = (d) => {
      if (d <= -90) return 2;
      if (d < 0)    return 2 + (d + 90) / 90 * 8;   // 2..10
      if (d <= 30)  return 10 + d / 30 * 14;         // 10..24
      if (d <= 90)  return 24 + (d - 30) / 60 * 24;  // 24..48
      if (d <= 180) return 48 + (d - 90) / 90 * 24;  // 48..72
      if (d <= 365) return 72 + (d - 180) / 185 * 26;// 72..98
      return 98;
    };
    // Jitter vertical by record kind to avoid overlap
    const dots = dated.map((r, i) => {
      const pct = dayToPct(r.days);
      const t = tone(r);
      const daysText = r.days < 0
        ? `просрочено на ${Math.abs(r.days)} ${plural(Math.abs(r.days),'д.','д.','д.')}`
        : r.days === 0 ? 'сегодня'
        : `через ${r.days} ${plural(r.days,'д.','д.','д.')}`;
      const top = 46 + ((i * 13) % 22); // 46..68px
      return `
        <div class="radar-dot ${t} ${r.kind === 'crypto' ? 'crypto' : ''}"
             style="left:${pct.toFixed(1)}%;top:${top}px"
             title="${esc(r.type || '—')} · ${esc(shortName(r.emp.fullName))} · ${daysText}">
          <span class="radar-dot-tooltip">
            <strong>${esc(r.type || '—')}${r.kind==='crypto'?' (лицензия)':''}</strong><br>
            ${esc(shortName(r.emp.fullName))} · ${daysText}<br>
            ${fmtDate(r.expiry)}
          </span>
        </div>`;
    }).join('');
    return `
      <div class="radar-card">
        <div class="radar-head">
          <h3>Радар <em>сроков</em></h3>
          <div class="radar-head-hint">${dated.length} ${plural(dated.length,'запись','записи','записей')} на шкале</div>
        </div>
        <div class="radar-track">
          <div class="radar-zones">
            <span class="radar-zone-past">Просрочено</span>
            <span class="radar-zone-soon">≤ 30 дней</span>
            <span class="radar-zone-warn">≤ 90 дней</span>
            <span class="radar-zone-warn">≤ 180 дней</span>
            <span class="radar-zone-safe">Спокойно</span>
          </div>
          <div class="radar-today"></div>
          ${dots}
        </div>
        <div class="radar-legend">
          <span class="radar-legend-item"><span class="radar-legend-dot" style="background:var(--bad)"></span>Критично / просрочено</span>
          <span class="radar-legend-item"><span class="radar-legend-dot" style="background:var(--warn)"></span>Скоро истекает</span>
          <span class="radar-legend-item"><span class="radar-legend-dot" style="background:var(--ok)"></span>В норме</span>
          <span class="radar-legend-item"><span class="radar-legend-dot" style="background:var(--ink);border-style:double;border-width:3px"></span>КриптоПро</span>
        </div>
      </div>`;
  })();

  root.innerHTML = `
    ${radarHtml}
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-label">Просрочено</div>
        <div class="hero-stat-num num" style="color:${expired.length?'var(--bad)':'var(--ink-3)'}">${expired.length}</div>
        <div class="hero-stat-hint">Требует немедленных действий</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label">Истекает ≤ 30 дней</div>
        <div class="hero-stat-num num" style="color:${soon.length?'var(--bad)':'var(--ink-3)'}">${soon.length}</div>
        <div class="hero-stat-hint">Критичная зона</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label">Истекает ≤ 90 дней</div>
        <div class="hero-stat-num num" style="color:${warn.length?'var(--warn)':'var(--ink-3)'}">${warn.length}</div>
        <div class="hero-stat-hint">Стоит запланировать</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label">Активных</div>
        <div class="hero-stat-num num" style="color:var(--ok)">${ok.length}</div>
        <div class="hero-stat-hint">Из ${records.length} записей</div>
      </div>
    </div>

    ${records.length === 0 ? emptyState({
      title: 'Данные об ЭЦП отсутствуют',
      text: 'В анкетах сотрудников не указаны ключи и лицензии',
      action: '<button class="btn btn-primary" onclick="goto(\'survey\')">К анкете</button>'
    }) : `

    ${expired.length > 0 ? `
      <div class="card" style="margin-bottom:16px">
        <div class="card-head"><h3>Просроченные <em>записи</em></h3><div class="card-sub">Немедленно обновить — использовать систему нельзя</div></div>
        <div class="card-body">${expired.map(rowHtml).join('')}</div>
      </div>` : ''}

    ${soon.length > 0 ? `
      <div class="card" style="margin-bottom:16px">
        <div class="card-head"><h3>Истекают в течение <em>месяца</em></h3><div class="card-sub">Начать процедуру выпуска/продления сейчас</div></div>
        <div class="card-body">${soon.map(rowHtml).join('')}</div>
      </div>` : ''}

    ${warn.length > 0 ? `
      <div class="card" style="margin-bottom:16px">
        <div class="card-head"><h3>Истекают в течение <em>квартала</em></h3><div class="card-sub">Запланировать обновление</div></div>
        <div class="card-body">${warn.map(rowHtml).join('')}</div>
      </div>` : ''}

    ${ok.length > 0 ? `
      <div class="card">
        <div class="card-head"><h3>Активные <em>записи</em></h3><div class="card-sub">${ok.length} ${plural(ok.length,'запись','записи','записей')} без риска</div></div>
        <div class="card-body">${ok.map(rowHtml).join('')}</div>
      </div>` : ''}
    `}
  `;
}

  const allSysNames = new Set(state.systems.map(s => s.name));
  state.employees.forEach(e => (e.systems || []).forEach(s => s.name && allSysNames.add(s.name)));

  allSysNames.forEach(name => {
    const users = state.employees.filter(e => (e.systems || []).some(s => systemKey(s.name) === systemKey(name)));
    const mainUsers = users.filter(e => (e.systems || []).some(s => systemKey(s.name) === systemKey(name) && s.frequency === 'main'));
    const sysMeta = state.systems.find(s => systemKey(s.name) === systemKey(name));
    sysRisk.push({ name, users, mainUsers, priority: sysMeta?.priority || 'important', requiresEcp: sysMeta?.requiresEcp });
  });

  const critical = sysRisk.filter(r => r.users.length === 1);
  const warning = sysRisk.filter(r => r.users.length === 2);
  const orphan = sysRisk.filter(r => r.users.length === 0);
  const safe = sysRisk.filter(r => r.users.length >= 3);

  // Vulnerable employees — employees who are sole owners of ≥1 critical system
  const vulnerableMap = {};
  critical.forEach(r => {
    const ownerId = r.users[0].id;
    vulnerableMap[ownerId] ||= { emp: r.users[0], systems: [] };

          </div>

            <strong style="font-family:var(--font-display);font-size:15px;display:block;margin-bottom:2px">Автобусный <em style="color:var(--accent)">фактор</em></strong>
            Сколько сотрудников организации должны одновременно «попасть под автобус» (уволиться, уйти в отпуск, заболеть), чтобы работа с системой остановилась. Чем меньше — тем выше риск.
          </div>
        </div>
      </div>
    </div>

    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-label">Критично</div>
        <div class="hero-stat-num num" style="color:${critical.length?'var(--bad)':'var(--ok)'}">${critical.length}</div>
        <div class="hero-stat-hint">1 носитель знаний</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label">Уязвимо</div>
